<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Real-time Chat Application</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <!-- Auth Container -->
  <div id="authContainer" class="auth-container">
    <div class="auth-box">
      <h1>Real-time Chat App</h1>
      
      <div id="authTabs" class="auth-tabs">
        <button class="tab-button active" data-tab="login">Login</button>
        <button class="tab-button" data-tab="register">Register</button>
      </div>

      <!-- Login Form -->
      <div id="loginTab" class="tab-content active">
        <form id="loginForm">
          <input type="text" id="loginUsername" placeholder="Username" required>
          <input type="password" id="loginPassword" placeholder="Password" required>
          <button type="submit" class="btn btn-primary">Login</button>
          <div id="loginError" class="error-message"></div>
        </form>
      </div>

      <!-- Register Form -->
      <div id="registerTab" class="tab-content">
        <form id="registerForm">
          <input type="text" id="registerUsername" placeholder="Username" required>
          <input type="password" id="registerPassword" placeholder="Password" required>
          <input type="password" id="registerConfirmPassword" placeholder="Confirm Password" required>
          <button type="submit" class="btn btn-primary">Register</button>
          <div id="registerError" class="error-message"></div>
        </form>
      </div>
    </div>
  </div>

  <!-- Chat Application -->
  <div id="chatContainer" class="chat-container" style="display: none;">
    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="sidebar-header">
        <h2>Chat App</h2>
        <button id="logoutBtn" class="btn btn-sm btn-danger">Logout</button>
      </div>

      <div class="user-info">
        <div class="user-avatar" id="userAvatar"></div>
        <div class="user-details">
          <div class="username" id="currentUsername"></div>
          <div class="user-status online">● Online</div>
        </div>
      </div>

      <!-- Rooms Section -->
      <div class="section">
        <div class="section-header">
          <h3>Rooms</h3>
          <button type="button" id="createRoomBtn" class="btn btn-xs btn-info" title="Create new room">+</button>
        </div>
        <div id="roomsList" class="rooms-list">
          <!-- Rooms will be populated here -->
        </div>
      </div>

      <!-- Online Users Section -->
      <div class="section">
        <h3>Online Users (<span id="usersCount">0</span>)</h3>
        <div id="usersList" class="users-list">
          <!-- Online users will be populated here -->
        </div>
      </div>

      <!-- Notifications Section -->
      <div class="section">
        <div class="section-header">
          <h3>Notifications</h3>
          <button id="clearNotificationsBtn" class="btn btn-xs btn-secondary" title="Clear all">×</button>
        </div>
        <div id="notificationsList" class="notifications-list">
          <!-- Notifications will be populated here -->
        </div>
      </div>
    </aside>

    <!-- Main Chat Area -->
    <main class="main-content">
      <!-- Room Header -->
      <div id="chatHeader" class="chat-header">
        <div class="room-info">
          <h2 id="roomName">Select a room or user</h2>
          <span id="roomUsers" class="room-users"></span>
        </div>
        <div class="header-actions">
          <button id="clearHistoryBtn" class="btn btn-sm btn-secondary" title="Clear chat history">Clear</button>
        </div>
      </div>

      <!-- Messages Container -->
      <div id="messagesContainer" class="messages-container">
        <div class="messages-placeholder">
          <p>Select a room or user to start chatting</p>
        </div>
      </div>

      <!-- Typing Indicator -->
      <div id="typingIndicator" class="typing-indicator" style="display: none;">
        <span id="typingUser"></span> is typing<span class="dots"><span>.</span><span>.</span><span>.</span></span>
      </div>

      <!-- Chat Input -->
      <div class="chat-footer">
        <div class="input-area">
          <input 
            type="text" 
            id="messageInput" 
            placeholder="Type a message..." 
          >
          <button type="button" id="sendBtn" class="btn btn-primary" title="Send message (Enter)">Send</button>
          <button id="fileUploadBtn" class="btn btn-secondary" title="Share file" disabled>📎</button>
        </div>
        <div class="input-info">
          <small>Press Enter to send • Shift+Enter for new line</small>
        </div>
      </div>
    </main>

    <!-- Modal for creating room -->
    <div id="createRoomModal" class="modal">
      <div class="modal-content">
        <div class="modal-header">
          <h3>Create New Room</h3>
          <button type="button" class="close-btn" onclick="document.getElementById('createRoomModal').classList.remove('show')">×</button>
        </div>
        <form id="createRoomForm">
          <input type="text" id="newRoomName" placeholder="Room name" required>
          <input type="text" id="newRoomDesc" placeholder="Description (optional)">
          <button type="submit" class="btn btn-primary">Create</button>
        </form>
      </div>
    </div>
  </div>

  <!-- Loading Spinner -->
  <div id="loadingSpinner" class="loading-spinner" style="display: none;">
    <div class="spinner"></div>
    <p>Loading...</p>
  </div>

  <script src="mockBackend.js"></script>
  <script src="app.js"></script>
</body>
</html>
